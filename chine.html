<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cuisine Chinoise 🇨🇳</title>
    <link rel="stylesheet" href="style.css">
</head>
<body style="background-color: #000; color: #fff; margin: 0; font-family: sans-serif;">

    <!-- سهم الرجوع للمنيو الرئيسي -->
    <header style="padding: 20px; display: flex; align-items: center;">
        <a href="index.html" style="color: #d4af37; text-decoration: none; font-size: 35px; margin-right: 20px;">←</a>
        <h1 style="flex-grow: 1; text-align: center; color: #d4af37; margin: 0; font-family: serif; letter-spacing: 2px;">CUISINE CHINOISE</h1>
    </header>

    <!-- تنظيم الصور: 2 مقابلين 2 (Grid) -->
    <main style="display: grid; grid-template-columns: 1fr 1fr; gap: 25px; padding: 25px; max-width: 800px; margin: auto;">
        
        <!-- الأكلة 1: نودلز -->
        <div class="dish" style="cursor: pointer; text-align: center;" onclick="showDetails('Noodles Sauté aux Légumes', '65 DH', 'Des nouilles fines sautées au wok avec des légumes frais, du soja et des épices asiatiques.')">
            <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTMfsZ8ev04Q5rIWqbChYWI0RZHQB1YXp0oIA&s" alt="Noodles" style="width: 100%; border-radius: 10px; border: 1px solid #333;">
            <p style="margin-top: 10px; font-weight: bold; color: #d4af37;">Noodles aux Légumes</p>
        </div>

        <!-- الأكلة 2: دجاج كونغ باو -->
        <div class="dish" style="cursor: pointer; text-align: center;" onclick="showDetails('Poulet Kung Pao', '85 DH', 'Un plat épicé à base de dés de poulet, de cacahuètes, de légumes et de piments.')">
            <img src="https://www.unileverfoodsolutionsarabia.com/dam/global-ufs/mcos/meps/arabia/calcmenu/recipes/AE-recipes/In-Development/kung-pao-chicken/main-header.jpg" alt="Poulet Kung Pao" style="width: 100%; border-radius: 10px; border: 1px solid #333;">
            <p style="margin-top: 10px; font-weight: bold; color: #d4af37;">Poulet Kung Pao</p>
        </div>

        <!-- الأكلة 3: ديم سام -->
        <div class="dish" style="cursor: pointer; text-align: center;" onclick="showDetails('Dim Sum Vapeur', '70 DH', 'Petites bouchées cuites à la vapeur, farcies aux crevettes ou à la viande, servies dans des paniers en bambou.')">
            <img src="https://elnashrastorageaccount.blob.core.windows.net/elnashra/elnashra/elfann/images/extralarge/9041069_1768996835.jpg" alt="Dim Sum" style="width: 100%; border-radius: 10px; border: 1px solid #333;">
            <p style="margin-top: 10px; font-weight: bold; color: #d4af37;">Dim Sum Traditionnel</p>
        </div>

        <!-- الأكلة 4: حلويات (كرات السمسم) -->
        <div class="dish" style="cursor: pointer; text-align: center;" onclick="showDetails('Boules de Sésame', '45 DH', 'Une douceur chinoise croustillante à base de farine de riz gluant, fourrée à la pâte de haricots rouges et couverte de graines de sésame.')">
            <img src="https://cdn.ready-market.com.tw/21cd62de/Templates/pic/ANKO-Sesame-Ball-1200x1200.jpg?v=36031efc" alt="Boules de sésame" style="width: 100%; border-radius: 10px; border: 1px solid #333;">
            <p style="margin-top: 10px; font-weight: bold; color: #d4af37;">Boules de Sésame Sucrées</p>
        </div>

    </main>
</main>

    <!-- الربط بملف الجافاسكريبت الموحد -->
    <script src="script.js"></script>
</body>
</html>
